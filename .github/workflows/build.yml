name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  # Release events trigger the `publish` job (PyPI + GitHub Release
  # upload).  The job has its own `if:` guard on top, so the whole
  # publish path is double-locked to release events only.
  release:
    types: [published]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pick the LOWEST currently-available free runner per platform
          # so the produced wheels work on the widest target environments.
          # ---- Linux ---------------------------------------------------
          # Use the OLDEST cibuildwheel image still pullable for each
          # libc family — the image itself is the build host so its
          # baseline becomes the wheel's runtime requirement.
          # manylinux2014 = CentOS 7, glibc 2.17 (2014); covers
          # everything from RHEL 7 / Ubuntu 14.04+ onward.
          # musllinux_1_1 = Alpine 3.12, musl 1.1.24 (2020); covers
          # Alpine 3.12+ which is what most musl users have.
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            cibw_archs: x86_64
            cibw_build: cp310-manylinux_x86_64
            plat_tag: manylinux_2_17_x86_64
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            cibw_archs: x86_64
            cibw_build: cp310-musllinux_x86_64
            plat_tag: musllinux_1_1_x86_64
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            cibw_archs: aarch64
            cibw_build: cp310-manylinux_aarch64
            plat_tag: manylinux_2_17_aarch64
          - label: linux-aarch64-musllinux
            os: ubuntu-22.04-arm
            cibw_archs: aarch64
            cibw_build: cp310-musllinux_aarch64
            plat_tag: musllinux_1_1_aarch64

          # ---- macOS ---------------------------------------------------
          # macos-13 was retired Dec 2025.  macos-14 is the lowest free
          # arm64 image; macos-15-intel is the *only* remaining x86_64
          # image (supported through Aug 2027).
          - label: macos-x86_64
            os: macos-15-intel
            cibw_archs: x86_64
            cibw_build: cp310-macosx_x86_64
            plat_tag: ''
          - label: macos-arm64
            os: macos-14
            cibw_archs: arm64
            cibw_build: cp310-macosx_arm64
            plat_tag: ''

          # ---- Windows -------------------------------------------------
          # windows-2022 is the oldest free Win runner; windows-11-arm is
          # the only Windows arm64 option.
          - label: windows-x86_64
            os: windows-2022
            cibw_archs: AMD64
            cibw_build: cp310-win_amd64
            plat_tag: ''
          - label: windows-arm64
            os: windows-11-arm
            cibw_archs: ARM64
            cibw_build: cp310-win_arm64
            plat_tag: ''

    steps:
      - uses: actions/checkout@v4

      # macOS / Windows: cibuildwheel runs natively, so install JDK on the
      # runner host BEFORE cibuildwheel and run the asset scripts once.
      # Linux containers install the JDK inside CIBW_BEFORE_ALL.
      - name: Set up Temurin 11 (macOS / Windows x64)
        if: runner.os != 'Linux' && matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # Eclipse Temurin 11 ships no Windows-ARM64 build (21+ only), so
      # use Microsoft Build of OpenJDK 17 for the windows-11-arm runner.
      # The .so / .dll layout is identical; jlink on either produces a
      # functionally equivalent stripped JRE.
      - name: Set up Microsoft OpenJDK 11 (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '11'

      - name: Fetch jar + build JRE (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          bash scripts/fetch_plantuml_jar.sh
          bash scripts/build_jre.sh

      - name: Build wheel via cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Pin to the OLD images.
          # cibuildwheel-default `manylinux_2_28` would cap us at glibc 2.28+
          # (Debian 10+ / RHEL 8+). manylinux2014 (CentOS 7, glibc 2.17)
          # widens to anything 2014+.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_1
          CIBW_MUSLLINUX_AARCH64_IMAGE: musllinux_1_1

          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            # CentOS 7 reached EOL July 2024; mirror.centos.org returns 404.
            # Move yum to vault.centos.org which still hosts the archive.
            if [ -d /etc/yum.repos.d ]; then
              for r in /etc/yum.repos.d/CentOS-*.repo; do
                [ -f "$r" ] && sed -i \
                  -e 's|^mirrorlist=|#mirrorlist=|g' \
                  -e 's|^#baseurl=http://mirror.centos.org/centos|baseurl=http://vault.centos.org|g' \
                  "$r"
              done
            fi
            # JDK 11 is available in BOTH CentOS 7 (java-11-openjdk-devel +
            # java-11-openjdk-jmods) and Alpine 3.12 (openjdk11). No need
            # for an Adoptium tarball download; install via the native
            # package manager.
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache openjdk11 fontconfig freetype bash coreutils findutils curl
              # On alpine, /usr/lib/jvm/default-jvm is the canonical
              # symlink to the active JDK (javac is /usr/lib/jvm/default-jvm/bin/javac).
              export JAVA_HOME=/usr/lib/jvm/default-jvm
              [ -x "$JAVA_HOME/bin/javac" ] || export JAVA_HOME=/usr/lib/jvm/java-11-openjdk
            else
              yum install -y java-11-openjdk-devel java-11-openjdk-jmods \
                fontconfig freetype which findutils curl tar gzip
              # CentOS 7 puts java-11 under /usr/lib/jvm/java-11-openjdk-<...>.x86_64
              # — the path includes the build version so use the symlink helper.
              export JAVA_HOME=$(rpm -ql java-11-openjdk-devel 2>/dev/null \
                | grep -m1 '/bin/javac$' | sed 's|/bin/javac$||' \
                || echo /usr/lib/jvm/java-11-openjdk)
            fi
            echo "JAVA_HOME=$JAVA_HOME"
            ls -la "$JAVA_HOME/bin/jlink" "$JAVA_HOME/bin/javac" 2>&1 || true
            "$JAVA_HOME/bin/jlink" --version
            bash scripts/fetch_plantuml_jar.sh
            bash scripts/build_jre.sh
            bash scripts/stage_linux_runtime.sh

          CIBW_ENVIRONMENT_LINUX: PYPLANTUML_PLAT_TAG=${{ matrix.plat_tag }}
          CIBW_ENVIRONMENT_MACOS: ''
          CIBW_ENVIRONMENT_WINDOWS: ''

          # Disable auditwheel/delocate; we manage native libs manually.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: 'cp {wheel} {dest_dir}/'
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: 'cp {wheel} {dest_dir}/'
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: 'cp {wheel} {dest_dir}/'

          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest -v {project}/tests

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Stage 2: install each Linux wheel into a *fully bare* base image
  # (no JDK, no fontconfig, no extra system fonts) and run
  # `plantuml selfcheck` against it. This is the analogue of the portable
  # workflow's clean-env stage for the wheel form.
  #
  # macOS / Windows wheels are tested by cibuildwheel's CIBW_TEST_COMMAND
  # already (PyPI install on the host runner). Replicating that with
  # pre-installed system noise stripped is impractical for hosted
  # macOS / Windows runners, so we focus stage 2 on Linux where we can
  # reliably exercise the bundled fontconfig + native chain.
  # ------------------------------------------------------------------
  test_clean_linux:
    name: wheel test (clean) / ${{ matrix.label }} on ${{ matrix.image }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Listed oldest-to-newest within each family.  Stage-2 uses
        # bare distro images only (debian:* / ubuntu:* / rockylinux:* /
        # fedora:* / alpine:*), never docker-library/python or other
        # language-prebuilt images: the entire point of the test is
        # "user does pip install on a fresh distro and it works", so
        # python has to come from the distro's own package manager.
        #
        # Wheel ABI is manylinux_2_17 (glibc 2.17+, ~CentOS 7 era) and
        # musllinux_1_1 (musl 1.1+, ~Alpine 3.12 era), so distros as
        # old as Ubuntu 18.04, Debian 10 and Alpine 3.10 are within
        # the supported window.  Portable cannot share this matrix:
        # its build container is Debian 10 (glibc 2.28), which puts
        # Ubuntu 18.04 (glibc 2.27) below the floor for native exes.
        include:
          # Debian family (oldest to newest)
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'debian:10-slim'              # 2019, glibc 2.28 (EOL → archive.debian.org)
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'debian:10-slim'
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'debian:12-slim'              # 2023, glibc 2.36
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'debian:12-slim'
          # Ubuntu family (oldest to newest).  ubuntu:18.04 is also
          # the py3.6 representative — bionic ships python3 = 3.6.9.
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:18.04'                # 2018, glibc 2.27, py3.6 default
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:20.04'                # 2020, glibc 2.31
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'ubuntu:20.04'
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:22.04'                # 2022, glibc 2.35
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'ubuntu:22.04'
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:24.04'                # 2024, glibc 2.39
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'ubuntu:24.04'
          # Red Hat family (oldest to newest).
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'rockylinux:8'                # EL8, 2019, glibc 2.28
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'rockylinux:9'                # EL9, 2022, glibc 2.34
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'fedora:40'                   # Fedora 40, 2024
          # Alpine / musl family (oldest to newest).
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.10'                 # 2019, musl 1.1.22
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.12'                 # 2020, musl 1.1.24 (musllinux_1_1 floor)
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.20'                 # 2024
          - label: linux-aarch64-musllinux
            os: ubuntu-22.04-arm
            image: 'alpine:3.20'
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.21'                 # 2024
          - label: linux-aarch64-musllinux
            os: ubuntu-22.04-arm
            image: 'alpine:3.21'
    env:
      DOCKER_IMAGE: ${{ matrix.image }}
    steps:
      # Need the repo's tests/ + scripts/ to mount into the docker
      # container that runs pytest in stage 2.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist
      - name: List wheel
        shell: bash
        run: ls -lh dist/
      # Pre-extract the apt mirror URL from the runner host's apt config.
      # ubuntu-22.04 runners use 1-line `/etc/apt/sources.list`;
      # ubuntu-24.04 runners use deb822 `*.sources` files.
      # x86_64 hosts hit `azure.archive.ubuntu.com`, arm64 hosts hit
      # the Azure-region equivalent of `ports.ubuntu.com`. Capture
      # whichever URL is present so the docker container's apt can
      # use the same fast CDN edge instead of open-internet defaults.
      - name: Detect runner-host apt mirror
        id: aptmirror
        if: matrix.image != 'alpine:3.20' && matrix.image != 'alpine:3.21'
        shell: bash
        run: |
          # Concatenate every apt source-listing format the runner might use.
          # Errors from missing files are swallowed; pipefail must not kill us.
          set +o pipefail
          # GitHub ubuntu-22.04 x86_64 runners use the apt 'mirror+' protocol
          # (deb mirror+file:/etc/apt/apt-mirrors.txt ...), so the actual
          # URLs live in /etc/apt/apt-mirrors.txt rather than sources.list.
          ALL=$( { cat /etc/apt/sources.list 2>/dev/null; \
                   cat /etc/apt/apt-mirrors.txt 2>/dev/null; \
                   cat /etc/apt/sources.list.d/*.sources 2>/dev/null; \
                   cat /etc/apt/sources.list.d/*.list 2>/dev/null; } )
          echo '--- /etc/apt/sources.list ---'
          cat /etc/apt/sources.list 2>/dev/null | grep -vE '^\s*(#|$)' || true
          echo '--- /etc/apt/apt-mirrors.txt ---'
          cat /etc/apt/apt-mirrors.txt 2>/dev/null || true
          echo '--- /etc/apt/sources.list.d/ ---'
          ls -1 /etc/apt/sources.list.d/ 2>/dev/null || true
          for f in /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            grep -vE '^\s*(#|$)' "$f" || true
          done
          # Two-stage extraction: find every http(s) URL first, then keep
          # only ones whose hostname *contains* an ubuntu / debian mirror
          # marker. Match anywhere (not just suffix) since some mirrors
          # are 'mirrors.azure.com/ubuntu' style with the marker mid-path.
          MIRROR=$(printf '%s\n' "$ALL" \
            | grep -oE 'https?://[A-Za-z0-9.-]+' \
            | grep -E '(archive\.ubuntu\.com|ports\.ubuntu\.com|security\.ubuntu\.com|deb\.debian\.org|security\.debian\.org)' \
            | head -1)
          MIRROR=${MIRROR:-}
          echo "DETECTED MIRROR=$MIRROR"
          echo "mirror=$MIRROR" >> "$GITHUB_OUTPUT"
      # Stage 2a — selfcheck.  Fresh distro container, install python +
      # the wheel, then run the built-in diagnostic battery.
      - name: Selfcheck wheel in ${{ matrix.image }}
        shell: bash
        env:
          HOST_MIRROR: ${{ steps.aptmirror.outputs.mirror }}
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          test -n "$WHEEL" || { echo "no wheel artifact"; exit 1; }
          BASENAME=$(basename "$WHEEL")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -e BASENAME="$BASENAME" \
            -e HOST_MIRROR="$HOST_MIRROR" \
            "$DOCKER_IMAGE" sh -ec '
              sh /host-scripts/stage2_install_wheel.sh
              plantuml info
              plantuml selfcheck --no-color --no-env
            '
      # Stage 2b — external smoketest.  Fresh container with the same
      # image; install python + wheel; then run the same shell-only
      # smoketest portable uses.  The wheel's "plantuml" entry-point
      # script is the binary under test from the smoketest's POV.
      - name: External smoketest wheel in fresh ${{ matrix.image }} container
        shell: bash
        env:
          HOST_MIRROR: ${{ steps.aptmirror.outputs.mirror }}
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          BASENAME=$(basename "$WHEEL")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -e BASENAME="$BASENAME" \
            -e HOST_MIRROR="$HOST_MIRROR" \
            "$DOCKER_IMAGE" sh -ec '
              sh /host-scripts/stage2_install_wheel.sh
              PLANTUML=$(command -v plantuml)
              export PLANTUML
              sh /host-scripts/portable_smoketest.sh
            '
      # Stage 2c — pytest, in another fresh container.  Tests pass
      # must start from a clean slate (no fontconfig cache, no /tmp
      # leftovers from the prior stages).
      - name: Pytest wheel in fresh ${{ matrix.image }} container
        shell: bash
        env:
          HOST_MIRROR: ${{ steps.aptmirror.outputs.mirror }}
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          BASENAME=$(basename "$WHEEL")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -v "$PWD/tests:/tests:ro" \
            -e BASENAME="$BASENAME" \
            -e HOST_MIRROR="$HOST_MIRROR" \
            "$DOCKER_IMAGE" sh -ec '
              sh /host-scripts/stage2_install_wheel.sh
              pip3 install --quiet --break-system-packages pytest 2>/dev/null \
                || pip3 install --quiet pytest
              # Run pytest from a writable copy.  tests/ uses
              # relative imports (from .conftest import …) so it must
              # be loaded as the "tests" package — meaning cwd has to
              # be the *parent* of tests/, not tests/ itself.
              mkdir -p /work
              cp -r /tests /work/tests
              cd /work
              python3 -m pytest tests/ -v --tb=short --color=no
            '

  # macOS / Windows clean-env tests — no docker (those runners cannot host
  # Linux containers) so "clean" here means "fresh venv on the runner".
  # The runner has system python and system java, but the wheel uses its
  # bundled JRE and is installed into an isolated venv, so neither leaks
  # into selfcheck.  Each job runs on the same runner OS as the matching
  # build_wheels matrix entry, so we cover the full set of artifact tags.
  test_clean_macos_x86_64:
    name: wheel test (clean) / macos-x86_64
    needs: build_wheels
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-x86_64
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install wheel + selfcheck
        shell: bash
        run: |
          set -e
          ls -lh dist/
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v
          source .v/bin/activate
          # Use 'python -m pip ...' rather than 'pip ...' for self-
          # upgrades — Windows protects the venv's own pip.exe from
          # being modified by itself, so plain 'pip install --upgrade
          # pip' fails on windows-arm64.  'python -m pip' bypasses
          # that since the running interpreter is not pip.exe.
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL"
          plantuml info
          plantuml selfcheck --no-color --no-env
      - name: External smoketest wheel
        shell: bash
        run: |
          set -e
          source .v/bin/activate
          # 'command -v plantuml' on git-bash + windows returns the
          # path *without* the .exe suffix, then 'sh "$PLANTUML"' cannot
          # actually launch it.  shutil.which handles PATHEXT on windows
          # and just returns the binary path on mac/linux.
          PLANTUML=$(python -c "import shutil,sys; sys.stdout.write(shutil.which('plantuml') or '')")
          test -n "$PLANTUML" || { echo "plantuml not on PATH"; exit 1; }
          export PLANTUML
          sh scripts/portable_smoketest.sh
      - name: Pytest wheel in fresh venv
        shell: bash
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v2
          source .v2/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL" pytest
          python -m pytest tests/ -v --tb=short --color=no

  test_clean_macos_arm64:
    name: wheel test (clean) / macos-arm64
    needs: build_wheels
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install wheel + selfcheck
        shell: bash
        run: |
          set -e
          ls -lh dist/
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v
          source .v/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL"
          plantuml info
          plantuml selfcheck --no-color --no-env
      - name: External smoketest wheel
        shell: bash
        run: |
          set -e
          source .v/bin/activate
          # 'command -v plantuml' on git-bash + windows returns the
          # path *without* the .exe suffix, then 'sh "$PLANTUML"' cannot
          # actually launch it.  shutil.which handles PATHEXT on windows
          # and just returns the binary path on mac/linux.
          PLANTUML=$(python -c "import shutil,sys; sys.stdout.write(shutil.which('plantuml') or '')")
          test -n "$PLANTUML" || { echo "plantuml not on PATH"; exit 1; }
          export PLANTUML
          sh scripts/portable_smoketest.sh
      - name: Pytest wheel in fresh venv
        shell: bash
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v2
          source .v2/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL" pytest
          python -m pytest tests/ -v --tb=short --color=no

  test_clean_windows_x86_64:
    name: wheel test (clean) / windows-x86_64
    needs: build_wheels
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install wheel + selfcheck
        shell: bash
        run: |
          set -e
          ls -lh dist/
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v
          source .v/Scripts/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL"
          plantuml info
          plantuml selfcheck --no-color --no-env
      - name: External smoketest wheel
        shell: bash
        run: |
          set -e
          source .v/Scripts/activate
          # 'command -v plantuml' on git-bash + windows returns the
          # path *without* the .exe suffix, then 'sh "$PLANTUML"' cannot
          # actually launch it.  shutil.which handles PATHEXT on windows
          # and just returns the binary path on mac/linux.
          PLANTUML=$(python -c "import shutil,sys; sys.stdout.write(shutil.which('plantuml') or '')")
          test -n "$PLANTUML" || { echo "plantuml not on PATH"; exit 1; }
          export PLANTUML
          sh scripts/portable_smoketest.sh
      - name: Pytest wheel in fresh venv
        shell: bash
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v2
          source .v2/Scripts/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL" pytest
          python -m pytest tests/ -v --tb=short --color=no

  test_clean_windows_arm64:
    name: wheel test (clean) / windows-arm64
    needs: build_wheels
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel-windows-arm64
          path: dist
      # Native arm64 Python builds are available from 3.11 onward;
      # actions/setup-python@v5 honors that.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install wheel + selfcheck
        shell: bash
        run: |
          set -e
          ls -lh dist/
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v
          source .v/Scripts/activate
          # Use 'python -m pip ...' rather than 'pip ...' for self-
          # upgrades — Windows protects the venv's own pip.exe from
          # being modified by itself, so plain 'pip install --upgrade
          # pip' fails on windows-arm64.  'python -m pip' bypasses
          # that since the running interpreter is not pip.exe.
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL"
          plantuml info
          plantuml selfcheck --no-color --no-env
      - name: External smoketest wheel
        shell: bash
        run: |
          set -e
          source .v/Scripts/activate
          # 'command -v plantuml' on git-bash + windows returns the
          # path *without* the .exe suffix, then 'sh "$PLANTUML"' cannot
          # actually launch it.  shutil.which handles PATHEXT on windows
          # and just returns the binary path on mac/linux.
          PLANTUML=$(python -c "import shutil,sys; sys.stdout.write(shutil.which('plantuml') or '')")
          test -n "$PLANTUML" || { echo "plantuml not on PATH"; exit 1; }
          export PLANTUML
          sh scripts/portable_smoketest.sh
      - name: Pytest wheel in fresh venv
        shell: bash
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv .v2
          source .v2/Scripts/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "$WHEEL" pytest
          python -m pytest tests/ -v --tb=short --color=no

  collect:
    name: Collect & list wheels
    needs:
      - build_wheels
      - test_clean_linux
      - test_clean_macos_x86_64
      - test_clean_macos_arm64
      - test_clean_windows_x86_64
      - test_clean_windows_arm64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/*.whl

  # ------------------------------------------------------------------
  # FINAL STAGE — publish.  ONLY runs when the workflow was triggered
  # by a published release.  The `if:` on the job is a belt-and-braces
  # guard on top of the `on: release` filter so a manual
  # `workflow_dispatch` (or any other event) can never accidentally
  # publish.
  #
  # Two destinations:
  #   1. PyPI — via the official pypa/gh-action-pypi-publish action,
  #      authenticated via OIDC trusted publisher (NO API token in
  #      secrets).  This requires a one-time setup on PyPI:
  #        Project settings → Publishing → Add a new pending publisher
  #          PyPI project name: pyplantuml-bundled
  #          Owner:             HansBug
  #          Repository:        pyplantuml-bundled
  #          Workflow filename: build.yml
  #          Environment:       pypi
  #      The `environment: pypi` on this job matches that config so
  #      OIDC works.
  #   2. GitHub Release — `gh release upload` attaches every built
  #      wheel to the release that triggered the workflow.  The
  #      `GITHUB_TOKEN` is injected automatically.
  # ------------------------------------------------------------------
  publish:
    name: Publish wheels to PyPI + Release
    needs:
      - collect
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/pyplantuml-bundled
    permissions:
      contents: write       # for gh release upload
      id-token: write       # for PyPI OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          name: all-wheels
          path: dist

      - name: List wheels to publish
        run: ls -lh dist/

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Skip wheels already on PyPI — re-running a release should
          # not fail just because a previous attempt got the wheels up.
          skip-existing: true

      - name: Upload wheels to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -e
          gh release upload "$RELEASE_TAG" dist/*.whl --clobber
