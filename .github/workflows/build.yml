name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pick the LOWEST currently-available free runner per platform
          # so the produced wheels work on the widest target environments.
          # ---- Linux ---------------------------------------------------
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            cibw_archs: x86_64
            cibw_build: cp310-manylinux_x86_64
            plat_tag: manylinux_2_28_x86_64
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            cibw_archs: x86_64
            cibw_build: cp310-musllinux_x86_64
            plat_tag: musllinux_1_2_x86_64
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            cibw_archs: aarch64
            cibw_build: cp310-manylinux_aarch64
            plat_tag: manylinux_2_28_aarch64
          - label: linux-aarch64-musllinux
            os: ubuntu-22.04-arm
            cibw_archs: aarch64
            cibw_build: cp310-musllinux_aarch64
            plat_tag: musllinux_1_2_aarch64

          # ---- macOS ---------------------------------------------------
          # macos-13 was retired Dec 2025.  macos-14 is the lowest free
          # arm64 image; macos-15-intel is the *only* remaining x86_64
          # image (supported through Aug 2027).
          - label: macos-x86_64
            os: macos-15-intel
            cibw_archs: x86_64
            cibw_build: cp310-macosx_x86_64
            plat_tag: ''
          - label: macos-arm64
            os: macos-14
            cibw_archs: arm64
            cibw_build: cp310-macosx_arm64
            plat_tag: ''

          # ---- Windows -------------------------------------------------
          # windows-2022 is the oldest free Win runner; windows-11-arm is
          # the only Windows arm64 option.
          - label: windows-x86_64
            os: windows-2022
            cibw_archs: AMD64
            cibw_build: cp310-win_amd64
            plat_tag: ''
          - label: windows-arm64
            os: windows-11-arm
            cibw_archs: ARM64
            cibw_build: cp310-win_arm64
            plat_tag: ''

    steps:
      - uses: actions/checkout@v4

      # macOS / Windows: cibuildwheel runs natively, so install JDK on the
      # runner host BEFORE cibuildwheel and run the asset scripts once.
      # Linux containers install the JDK inside CIBW_BEFORE_ALL.
      - name: Set up Temurin 17 (macOS / Windows x64)
        if: runner.os != 'Linux' && matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Eclipse Temurin 17 ships no Windows-ARM64 build (21+ only), so
      # use Microsoft Build of OpenJDK 17 for the windows-11-arm runner.
      # The .so / .dll layout is identical; jlink on either produces a
      # functionally equivalent stripped JRE.
      - name: Set up Microsoft OpenJDK 17 (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '17'

      - name: Fetch jar + build JRE (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          bash scripts/fetch_plantuml_jar.sh
          bash scripts/build_jre.sh

      - name: Build wheel via cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Force the modern manylinux baseline; the default (manylinux2014,
          # CentOS 7) was removed when CentOS 7 went EOL in 2024.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y java-17-openjdk-devel java-17-openjdk-jmods fontconfig freetype which findutils
            elif command -v yum >/dev/null 2>&1; then
              yum install -y java-17-openjdk-devel java-17-openjdk-jmods fontconfig freetype which findutils
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache openjdk17 fontconfig freetype bash coreutils findutils
            else
              echo "no supported package manager"; exit 1
            fi
            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(command -v javac))))
            echo "JAVA_HOME=$JAVA_HOME"
            bash scripts/fetch_plantuml_jar.sh
            bash scripts/build_jre.sh
            bash scripts/stage_linux_runtime.sh

          CIBW_ENVIRONMENT_LINUX: PYPLANTUML_PLAT_TAG=${{ matrix.plat_tag }}
          CIBW_ENVIRONMENT_MACOS: ''
          CIBW_ENVIRONMENT_WINDOWS: ''

          # Disable auditwheel/delocate; we manage native libs manually.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: 'cp {wheel} {dest_dir}/'
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: 'cp {wheel} {dest_dir}/'
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: 'cp {wheel} {dest_dir}/'

          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest -v {project}/tests

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Stage 2: install each Linux wheel into a *fully bare* base image
  # (no JDK, no fontconfig, no extra system fonts) and run
  # `plantuml selfcheck` against it. This is the analogue of the portable
  # workflow's clean-env stage for the wheel form.
  #
  # macOS / Windows wheels are tested by cibuildwheel's CIBW_TEST_COMMAND
  # already (PyPI install on the host runner). Replicating that with
  # pre-installed system noise stripped is impractical for hosted
  # macOS / Windows runners, so we focus stage 2 on Linux where we can
  # reliably exercise the bundled fontconfig + native chain.
  # ------------------------------------------------------------------
  test_clean_linux:
    name: wheel test (clean) / ${{ matrix.label }} on ${{ matrix.image }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'debian:12-slim'
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:22.04'
          - label: linux-x86_64-manylinux
            os: ubuntu-22.04
            image: 'ubuntu:24.04'
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'debian:12-slim'
          - label: linux-aarch64-manylinux
            os: ubuntu-22.04-arm
            image: 'ubuntu:22.04'
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.20'
          - label: linux-x86_64-musllinux
            os: ubuntu-22.04
            image: 'alpine:3.21'
          - label: linux-aarch64-musllinux
            os: ubuntu-22.04-arm
            image: 'alpine:3.20'
    env:
      DOCKER_IMAGE: ${{ matrix.image }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist
      - name: List wheel
        shell: bash
        run: ls -lh dist/
      # Pre-extract the apt mirror URL from the runner host's apt config.
      # ubuntu-22.04 runners use 1-line `/etc/apt/sources.list`;
      # ubuntu-24.04 runners use deb822 `*.sources` files.
      # x86_64 hosts hit `azure.archive.ubuntu.com`, arm64 hosts hit
      # the Azure-region equivalent of `ports.ubuntu.com`. Capture
      # whichever URL is present so the docker container's apt can
      # use the same fast CDN edge instead of open-internet defaults.
      - name: Detect runner-host apt mirror
        id: aptmirror
        if: matrix.image != 'alpine:3.20' && matrix.image != 'alpine:3.21'
        shell: bash
        run: |
          # Concatenate every apt source-listing format the runner might use.
          # Errors from missing files are swallowed; pipefail must not kill us.
          set +o pipefail
          ALL=$( { cat /etc/apt/sources.list 2>/dev/null; \
                   cat /etc/apt/sources.list.d/*.sources 2>/dev/null; \
                   cat /etc/apt/sources.list.d/*.list 2>/dev/null; } )
          echo "runner sources excerpt:"
          printf '%s\n' "$ALL" | head -8
          # Two-stage extraction: find every http(s) URL first, then keep
          # only ones that point at an ubuntu / debian mirror hostname.
          MIRROR=$(printf '%s\n' "$ALL" \
            | grep -oE 'https?://[A-Za-z0-9.-]+' \
            | grep -E '\.?(archive\.ubuntu\.com|ports\.ubuntu\.com|security\.ubuntu\.com|deb\.debian\.org|security\.debian\.org)$' \
            | head -1)
          MIRROR=${MIRROR:-}
          echo "MIRROR=$MIRROR"
          echo "mirror=$MIRROR" >> "$GITHUB_OUTPUT"
      - name: Selfcheck wheel in ${{ matrix.image }}
        shell: bash
        env:
          HOST_MIRROR: ${{ steps.aptmirror.outputs.mirror }}
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          test -n "$WHEEL" || { echo "no wheel artifact"; exit 1; }
          BASENAME=$(basename "$WHEEL")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -e BASENAME="$BASENAME" \
            -e HOST_MIRROR="$HOST_MIRROR" \
            "$DOCKER_IMAGE" sh -ec '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache python3 py3-pip
              else
                # GitHub runners are ubuntu (so HOST_MIRROR is an ubuntu
                # mirror — archive.ubuntu.com / ports.ubuntu.com / azure
                # variants). Rewriting a *debian* container'\''s sources
                # to point at an ubuntu mirror produces 404s — only
                # rewrite when the container is also ubuntu.
                CONTAINER_ID=$(. /etc/os-release 2>/dev/null && echo "$ID")
                if [ -n "$HOST_MIRROR" ] && [ "$CONTAINER_ID" = "ubuntu" ]; then
                  echo "rewriting apt sources to: $HOST_MIRROR"
                  for f in /etc/apt/sources.list \
                           /etc/apt/sources.list.d/*.list \
                           /etc/apt/sources.list.d/*.sources; do
                    [ -f "$f" ] || continue
                    sed -i -E \
                      -e "s|https?://[^ /]*\\.?archive\\.ubuntu\\.com|$HOST_MIRROR|g" \
                      -e "s|https?://[^ /]*\\.?security\\.ubuntu\\.com|$HOST_MIRROR|g" \
                      -e "s|https?://[^ /]*\\.?ports\\.ubuntu\\.com|$HOST_MIRROR|g" \
                      "$f"
                  done
                  echo "post-rewrite sources excerpt:"
                  { cat /etc/apt/sources.list 2>/dev/null; \
                    cat /etc/apt/sources.list.d/*.sources 2>/dev/null; \
                    cat /etc/apt/sources.list.d/*.list 2>/dev/null; } | head -6
                else
                  echo "skipping apt mirror rewrite (container=$CONTAINER_ID, host_mirror=$HOST_MIRROR)"
                fi
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  python3 python3-pip ca-certificates
              fi
              pip3 install --quiet --break-system-packages "/dist/$BASENAME" \
                || pip3 install --quiet "/dist/$BASENAME"
              plantuml info
              plantuml selfcheck --no-color --no-env
            '

  collect:
    name: Collect & list wheels
    needs: [build_wheels, test_clean_linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/*.whl
