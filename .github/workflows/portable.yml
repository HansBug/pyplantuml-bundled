name: Portable executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Stage 1: build the PyInstaller executable on a fully-equipped runner.
  # ------------------------------------------------------------------
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Embedded Python is the lowest version that is still buildable
          # for each platform/arch slot.  Lower Python = older symbol
          # baseline = binary runs on more target systems.  3.7 is the
          # floor; bump only when the slot has no 3.7 build (Apple
          # Silicon, Windows ARM64).
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            plat_tag: linux-x86_64-glibc
            container: 'python:3.6-slim-buster'   # Debian 9, glibc 2.24, 2017
            build_python: '3.6'
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            plat_tag: linux-aarch64-glibc
            container: 'python:3.6-slim-buster'
            build_python: '3.6'
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            plat_tag: linux-x86_64-musl
            container: 'python:3.6-alpine3.12'      # Alpine 3.12, musl 1.1.24, 2020
            build_python: '3.6'
          - label: linux-aarch64-musl
            os: ubuntu-22.04-arm
            plat_tag: linux-aarch64-musl
            container: 'python:3.6-alpine3.12'
            build_python: '3.6'
          - label: macos-x86_64
            os: macos-15-intel
            plat_tag: macos-x86_64
            container: ''
            build_python: '3.7'                    # setup-python may have dropped 3.6 on macos
          # macOS arm64 portable is intentionally NOT built: PyInstaller-bundled
          # OpenJDK on Apple Silicon hits a hard SIGSEGV in libjvm init the
          # moment hardened-runtime is on, regardless of:
          #   * --options runtime / not --options runtime
          #   * remove-signature + re-sign-without-runtime
          #   * spec-level entitlements (allow-jit + disable-library-validation +
          #     allow-unsigned-executable-memory + disable-executable-page-protection)
          #   * -Xint to skip JIT
          # ad-hoc signatures cannot grant the JIT entitlement on macOS arm64
          # in any way Apple actually honours; only Developer-ID signed binaries
          # can.  Wheel install (pip install pyplantuml-bundled) works on
          # macos-arm64 — the JRE is fine when not extracted from a frozen exe.
          - label: windows-x86_64
            os: windows-2022
            plat_tag: windows-x86_64
            container: ''
            build_python: '3.7'                    # 3.6 cache may be gone for Windows too
          - label: windows-arm64
            os: windows-11-arm
            plat_tag: windows-arm64
            container: ''
            build_python: '3.11'                   # 3.7 has no win-arm64 build

    env:
      PYI_PLAT_TAG: ${{ matrix.plat_tag }}
      BUILD_CONTAINER: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 11 (macOS / Windows x64)
        if: runner.os != 'Linux' && matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Microsoft OpenJDK 11 (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '11'

      - name: Set up Python (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.build_python }}

      - name: Build assets + PyInstaller (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # PyInstaller 5.6+ dropped Python 3.6, PyInstaller 6 dropped 3.7.
          PYI_PIN=$(python -c 'import sys; v=sys.version_info[:2]; print("pyinstaller<5.6" if v<(3,7) else ("pyinstaller<6" if v<(3,8) else "pyinstaller"))')
          # click 8+ dropped Python 3.6 support.
          CLICK_PIN=$(python -c 'import sys; print("click<8" if sys.version_info < (3, 7) else "click")')
          python -m pip install "$PYI_PIN" "$CLICK_PIN"
          bash scripts/fetch_plantuml_jar.sh
          bash scripts/build_jre.sh
          bash scripts/pyinstaller/build.sh

      - name: Build assets + PyInstaller (Linux, inside ${{ matrix.container }})
        if: runner.os == 'Linux'
        run: |
          set -e
          docker run --rm \
            -e PYI_PLAT_TAG \
            -v "$PWD:/work" -w /work \
            "$BUILD_CONTAINER" \
            sh -ec '
              if command -v apk >/dev/null 2>&1; then
                # alpine has no prebuilt PyInstaller bootloader for Python
                # 3.6+musl; pip falls back to building from source which
                # needs gcc + musl-dev + python3-dev + linux-headers + zlib-dev.
                apk add --no-cache bash zip curl openjdk11 fontconfig freetype \
                  libpng expat libuuid zlib brotli-libs which findutils binutils \
                  gcc musl-dev python3-dev linux-headers zlib-dev
              else
                # Debian 9 stretch / 10 buster reached LTS EOL; default
                # apt mirrors return 404. Source /etc/os-release without
                # using grep+regex (which fights single-quote escaping
                # under sh -ec) to detect codename and patch to
                # archive.debian.org when needed.
                CODENAME=
                if [ -f /etc/os-release ]; then
                  . /etc/os-release
                  CODENAME=$VERSION_CODENAME
                fi
                case "$CODENAME" in
                  stretch|buster|jessie)
                    sed -i \
                      -e "s|deb.debian.org|archive.debian.org|g" \
                      -e "s|security.debian.org/debian-security|archive.debian.org/debian-security|g" \
                      -e "s|security.debian.org|archive.debian.org/debian-security|g" \
                      -e "/${CODENAME}-updates/d" \
                      /etc/apt/sources.list
                    printf "%s\n" "Acquire::Check-Valid-Until \"false\";" \
                      > /etc/apt/apt.conf.d/99no-check-valid-until
                    ;;
                esac
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  zip binutils curl ca-certificates openjdk-11-jdk-headless \
                  fontconfig libfreetype6 libpng16-16 libexpat1 libuuid1 \
                  zlib1g libbrotli1
              fi
              # Distro-canonical JAVA_HOME. alpine has /usr/lib/jvm/default-jvm
              # symlink; debian javac via readlink chain.  No comment apostrophes
              # below — they would break the outer sh -ec single-quoted body.
              if command -v apk >/dev/null 2>&1; then
                export JAVA_HOME=/usr/lib/jvm/default-jvm
                [ -x "$JAVA_HOME/bin/javac" ] || export JAVA_HOME=/usr/lib/jvm/java-11-openjdk
              else
                export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))
              fi
              echo "JAVA_HOME=$JAVA_HOME"
              ls -la "$JAVA_HOME/bin/javac" "$JAVA_HOME/bin/jlink" 2>&1 || true
              PYI_PIN=$(python -c "import sys; v=sys.version_info[:2]; print(\"pyinstaller<5.6\" if v<(3,7) else (\"pyinstaller<6\" if v<(3,8) else \"pyinstaller\"))")
              CLICK_PIN=$(python -c "import sys; print(\"click<8\" if sys.version_info < (3, 7) else \"click\")")
              pip install --no-cache-dir "$PYI_PIN" "$CLICK_PIN"
              bash scripts/fetch_plantuml_jar.sh
              bash scripts/build_jre.sh
              bash scripts/stage_linux_runtime.sh
              bash scripts/pyinstaller/build.sh
            '

      - name: List artifacts
        shell: bash
        run: ls -lh pyinstaller-dist/

      - uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.label }}
          path: |
            pyinstaller-dist/plantuml-onefile-*
            pyinstaller-dist/plantuml-onedir-*.zip
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Stage 2: clean-env tests. Each Linux test pulls a base image with
  # neither Python nor Java installed; macOS/Windows tests run on the
  # bare runner with the artifact freshly downloaded.
  # ------------------------------------------------------------------
  test_clean_linux:
    name: test (clean) / ${{ matrix.label }} on ${{ matrix.image }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Listed oldest-to-newest within each family, mirroring the
        # wheel-side test_clean_linux matrix.  Two distros that are
        # in the wheel matrix are *not* repeated here:
        #   ubuntu:18.04 — glibc 2.27, below portable's 2.28 floor
        #     (portable build container is Debian 10 = glibc 2.28).
        #   python:3.6-* — language-prebuilt image, not a system mirror.
        # Everything else carries over.
        include:
          # Debian (oldest → newest)
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'debian:10-slim'              # 2019, glibc 2.28
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'debian:10-slim'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'debian:12-slim'              # 2023, glibc 2.36
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'debian:12-slim'
          # Ubuntu (oldest → newest, no 18.04)
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:20.04'                # 2020, glibc 2.31
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'ubuntu:20.04'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:22.04'                # 2022, glibc 2.35
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'ubuntu:22.04'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:24.04'                # 2024, glibc 2.39
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'ubuntu:24.04'
          # Red Hat (oldest → newest, both archs)
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'rockylinux:8'                # EL8, 2019, glibc 2.28
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'rockylinux:8'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'rockylinux:9'                # EL9, 2022, glibc 2.34
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'rockylinux:9'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'fedora:40'                   # Fedora 40, 2024
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'fedora:40'
          # Alpine / musl (oldest → newest)
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.10'                 # 2019, musl 1.1.22
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.12'                 # 2020, musl 1.1.24 (musllinux_1_1 floor)
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.20'                 # 2024
          - label: linux-aarch64-musl
            os: ubuntu-22.04-arm
            image: 'alpine:3.20'
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.21'                 # 2024
          - label: linux-aarch64-musl
            os: ubuntu-22.04-arm
            image: 'alpine:3.21'

    env:
      DOCKER_IMAGE: ${{ matrix.image }}

    steps:
      # Need scripts/portable_smoketest.sh on the runner to mount it
      # into the docker container during the external-smoketest step.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: portable-${{ matrix.label }}
          path: dist

      - name: List downloaded artifact
        shell: bash
        run: ls -lh dist/

      - name: Selfcheck onefile in ${{ matrix.image }}
        shell: bash
        run: |
          set -e
          ONEFILE=$(ls dist/plantuml-onefile-* | head -1)
          test -n "$ONEFILE" || { echo 'no onefile artifact'; exit 1; }
          chmod +x "$ONEFILE"
          BASENAME=$(basename "$ONEFILE")
          docker run --rm -v "$PWD/dist:/dist:ro" -e BASENAME="$BASENAME" \
            "$DOCKER_IMAGE" sh -ec '
              command -v python3 >/dev/null 2>&1 && echo "warn: python3 present" || echo "ok: no python3"
              command -v java >/dev/null 2>&1 && echo "warn: java present" || echo "ok: no java"
              cp "/dist/$BASENAME" /tmp/plantuml
              chmod +x /tmp/plantuml
              /tmp/plantuml --help >/dev/null
              /tmp/plantuml info
              /tmp/plantuml selfcheck --no-color --no-env
            '

      - name: Selfcheck onedir.zip in ${{ matrix.image }}
        shell: bash
        run: |
          set -e
          ONEDIR_ZIP=$(ls dist/plantuml-onedir-*.zip | head -1)
          test -n "$ONEDIR_ZIP" || { echo 'no onedir zip artifact'; exit 1; }
          # Extract on the host runner (ubuntu has unzip preinstalled) and
          # mount the unpacked dir into the bare test container.  Avoids a
          # dependency on apt/apk having a working unzip mirror inside
          # whatever bare image we are testing against.
          rm -rf extracted; mkdir extracted
          unzip -q "$ONEDIR_ZIP" -d extracted
          INNER=$(ls -d extracted/plantuml-onedir-* | head -1)
          test -d "$INNER" || { echo "extraction produced no dir"; exit 1; }
          docker run --rm -v "$PWD/$INNER:/opt/plantuml-onedir:ro" \
            "$DOCKER_IMAGE" sh -ec '
              # Copy in (read-only mount + chmod cannot coexist on some FS)
              cp -r /opt/plantuml-onedir /tmp/plantuml-onedir
              chmod +x /tmp/plantuml-onedir/plantuml
              /tmp/plantuml-onedir/plantuml --help >/dev/null
              /tmp/plantuml-onedir/plantuml selfcheck --no-color --no-env
            '

      # External-perspective smoketest: a fresh container, no python /
      # java installed.  The portable binary is the only thing allowed
      # to run.  Five black-box checks via portable_smoketest.sh:
      # -version banner, -tpng PNG header, -tsvg structure,
      # -checkonly exit code, CJK PNG byte size.
      - name: External smoketest onefile in fresh ${{ matrix.image }} container
        shell: bash
        run: |
          set -e
          ONEFILE=$(ls dist/plantuml-onefile-* | head -1)
          chmod +x "$ONEFILE"
          BASENAME=$(basename "$ONEFILE")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -e BASENAME="$BASENAME" \
            "$DOCKER_IMAGE" sh -ec '
              cp "/dist/$BASENAME" /tmp/plantuml
              chmod +x /tmp/plantuml
              export PLANTUML=/tmp/plantuml
              sh /host-scripts/portable_smoketest.sh
            '

      - name: External smoketest onedir.zip in fresh ${{ matrix.image }} container
        shell: bash
        run: |
          set -e
          # Reuse the host-side extracted dir from the selfcheck step.
          INNER=$(ls -d extracted/plantuml-onedir-* | head -1)
          docker run --rm \
            -v "$PWD/$INNER:/opt/plantuml-onedir:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            "$DOCKER_IMAGE" sh -ec '
              cp -r /opt/plantuml-onedir /tmp/plantuml-onedir
              chmod +x /tmp/plantuml-onedir/plantuml
              export PLANTUML=/tmp/plantuml-onedir/plantuml
              sh /host-scripts/portable_smoketest.sh
            '

      # Stage 2c — pytest of the portable binary.  This is the *only*
      # stage where python and pytest are installed inside the test
      # container; the binary itself is exercised via subprocess from
      # tests_portable/ (no Python API is imported).
      - name: Pytest onefile in fresh ${{ matrix.image }} container
        shell: bash
        run: |
          set -e
          ONEFILE=$(ls dist/plantuml-onefile-* | head -1)
          chmod +x "$ONEFILE"
          BASENAME=$(basename "$ONEFILE")
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -v "$PWD/tests_portable:/tests_portable:ro" \
            -e BASENAME="$BASENAME" \
            "$DOCKER_IMAGE" sh -ec '
              sh /host-scripts/stage2_install_python.sh
              pip3 install --quiet --break-system-packages pytest 2>/dev/null \
                || pip3 install --quiet pytest
              cp /dist/$BASENAME /tmp/plantuml
              chmod +x /tmp/plantuml
              export PLANTUML=/tmp/plantuml
              mkdir -p /work
              cp -r /tests_portable /work/tests_portable
              cd /work
              python3 -m pytest tests_portable/ -v --tb=short --color=no
            '

      - name: Pytest onedir in fresh ${{ matrix.image }} container
        shell: bash
        run: |
          set -e
          INNER=$(ls -d extracted/plantuml-onedir-* | head -1)
          docker run --rm \
            -v "$PWD/$INNER:/opt/plantuml-onedir:ro" \
            -v "$PWD/scripts:/host-scripts:ro" \
            -v "$PWD/tests_portable:/tests_portable:ro" \
            "$DOCKER_IMAGE" sh -ec '
              sh /host-scripts/stage2_install_python.sh
              pip3 install --quiet --break-system-packages pytest 2>/dev/null \
                || pip3 install --quiet pytest
              cp -r /opt/plantuml-onedir /tmp/plantuml-onedir
              chmod +x /tmp/plantuml-onedir/plantuml
              export PLANTUML=/tmp/plantuml-onedir/plantuml
              mkdir -p /work
              cp -r /tests_portable /work/tests_portable
              cd /work
              python3 -m pytest tests_portable/ -v --tb=short --color=no
            '

  test_clean_macos_x86:
    name: test (clean) / macos-x86_64
    needs: build
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: portable-macos-x86_64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          chmod +x dist/plantuml-onefile-macos-x86_64
          ./dist/plantuml-onefile-macos-x86_64 --help >/dev/null
          ./dist/plantuml-onefile-macos-x86_64 info
          ./dist/plantuml-onefile-macos-x86_64 selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-macos-x86_64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          chmod +x "$DIR/plantuml"
          "$DIR/plantuml" selfcheck --no-color --no-env
      - name: External smoketest onefile
        shell: bash
        run: |
          PLANTUML="$PWD/dist/plantuml-onefile-macos-x86_64" \
            sh scripts/portable_smoketest.sh
      - name: External smoketest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml" \
            sh scripts/portable_smoketest.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Pytest onefile
        shell: bash
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pytest
          PLANTUML="$PWD/dist/plantuml-onefile-macos-x86_64" \
            python -m pytest tests_portable/ -v --tb=short --color=no
      - name: Pytest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml" \
            python -m pytest tests_portable/ -v --tb=short --color=no

  # macos-arm64 portable test is omitted — see the build matrix comment for why.

  test_clean_windows_x86:
    name: test (clean) / windows-x86_64
    needs: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows-x86_64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          ls dist/
          ./dist/plantuml-onefile-windows-x86_64.exe --help
          ./dist/plantuml-onefile-windows-x86_64.exe info
          ./dist/plantuml-onefile-windows-x86_64.exe selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-windows-x86_64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          "$DIR/plantuml.exe" selfcheck --no-color --no-env
      - name: External smoketest onefile
        shell: bash
        run: |
          PLANTUML="$PWD/dist/plantuml-onefile-windows-x86_64.exe" \
            sh scripts/portable_smoketest.sh
      - name: External smoketest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml.exe" \
            sh scripts/portable_smoketest.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Pytest onefile
        shell: bash
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pytest
          PLANTUML="$PWD/dist/plantuml-onefile-windows-x86_64.exe" \
            python -m pytest tests_portable/ -v --tb=short --color=no
      - name: Pytest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml.exe" \
            python -m pytest tests_portable/ -v --tb=short --color=no

  test_clean_windows_arm64:
    name: test (clean) / windows-arm64
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows-arm64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          ./dist/plantuml-onefile-windows-arm64.exe --help
          ./dist/plantuml-onefile-windows-arm64.exe info
          ./dist/plantuml-onefile-windows-arm64.exe selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-windows-arm64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          "$DIR/plantuml.exe" selfcheck --no-color --no-env
      - name: External smoketest onefile
        shell: bash
        run: |
          PLANTUML="$PWD/dist/plantuml-onefile-windows-arm64.exe" \
            sh scripts/portable_smoketest.sh
      - name: External smoketest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml.exe" \
            sh scripts/portable_smoketest.sh
      # Native arm64 Python is available from 3.11.  setup-python@v5
      # honors that on windows-11-arm runners.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pytest onefile
        shell: bash
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pytest
          PLANTUML="$PWD/dist/plantuml-onefile-windows-arm64.exe" \
            python -m pytest tests_portable/ -v --tb=short --color=no
      - name: Pytest onedir
        shell: bash
        run: |
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          PLANTUML="$PWD/$DIR/plantuml.exe" \
