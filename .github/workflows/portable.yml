name: Portable executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Stage 1: build the PyInstaller executable on a fully-equipped runner.
  # ------------------------------------------------------------------
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Embedded Python is the lowest version that is still buildable
          # for each platform/arch slot.  Lower Python = older symbol
          # baseline = binary runs on more target systems.  3.7 is the
          # floor; bump only when the slot has no 3.7 build (Apple
          # Silicon, Windows ARM64).
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            plat_tag: linux-x86_64-glibc
            container: 'python:3.6-slim-stretch'   # Debian 9, glibc 2.24, 2017
            build_python: '3.6'
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            plat_tag: linux-aarch64-glibc
            container: 'python:3.6-slim-stretch'
            build_python: '3.6'
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            plat_tag: linux-x86_64-musl
            container: 'python:3.6-alpine3.7'      # Alpine 3.7, musl 1.1.18, 2017
            build_python: '3.6'
          - label: linux-aarch64-musl
            os: ubuntu-22.04-arm
            plat_tag: linux-aarch64-musl
            container: 'python:3.6-alpine3.7'
            build_python: '3.6'
          - label: macos-x86_64
            os: macos-15-intel
            plat_tag: macos-x86_64
            container: ''
            build_python: '3.7'                    # setup-python may have dropped 3.6 on macos
          # macOS arm64 portable is intentionally NOT built: PyInstaller-bundled
          # OpenJDK on Apple Silicon hits a hard SIGSEGV in libjvm init the
          # moment hardened-runtime is on, regardless of:
          #   * --options runtime / not --options runtime
          #   * remove-signature + re-sign-without-runtime
          #   * spec-level entitlements (allow-jit + disable-library-validation +
          #     allow-unsigned-executable-memory + disable-executable-page-protection)
          #   * -Xint to skip JIT
          # ad-hoc signatures cannot grant the JIT entitlement on macOS arm64
          # in any way Apple actually honours; only Developer-ID signed binaries
          # can.  Wheel install (pip install pyplantuml-bundled) works on
          # macos-arm64 — the JRE is fine when not extracted from a frozen exe.
          - label: windows-x86_64
            os: windows-2022
            plat_tag: windows-x86_64
            container: ''
            build_python: '3.7'                    # 3.6 cache may be gone for Windows too
          - label: windows-arm64
            os: windows-11-arm
            plat_tag: windows-arm64
            container: ''
            build_python: '3.11'                   # 3.7 has no win-arm64 build

    env:
      PYI_PLAT_TAG: ${{ matrix.plat_tag }}
      BUILD_CONTAINER: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 17 (macOS / Windows x64)
        if: runner.os != 'Linux' && matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Microsoft OpenJDK 17 (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '17'

      - name: Set up Python (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.build_python }}

      - name: Build assets + PyInstaller (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # PyInstaller 5.6+ dropped Python 3.6, PyInstaller 6 dropped 3.7.
          PYI_PIN=$(python -c 'import sys
v = sys.version_info[:2]
if v < (3, 7): print("pyinstaller<5.6")
elif v < (3, 8): print("pyinstaller<6")
else: print("pyinstaller")')
          # click 8+ dropped Python 3.6 support.
          CLICK_PIN=$(python -c 'import sys; print("click<8" if sys.version_info < (3, 7) else "click")')
          python -m pip install "$PYI_PIN" "$CLICK_PIN"
          bash scripts/fetch_plantuml_jar.sh
          bash scripts/build_jre.sh
          bash scripts/pyinstaller/build.sh

      - name: Build assets + PyInstaller (Linux, inside ${{ matrix.container }})
        if: runner.os == 'Linux'
        run: |
          set -e
          docker run --rm \
            -e PYI_PLAT_TAG \
            -v "$PWD:/work" -w /work \
            "$BUILD_CONTAINER" \
            sh -ec '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache bash zip curl openjdk17 fontconfig freetype \
                  libpng expat libuuid zlib brotli-libs which findutils binutils
              else
                apt-get update -qq
                apt-get install -y --no-install-recommends \
                  zip binutils curl ca-certificates openjdk-17-jdk-headless \
                  fontconfig libfreetype6 libpng16-16 libexpat1 libuuid1 \
                  zlib1g libbrotli1
              fi
              JAVA_HOME_GUESS=$(dirname $(dirname $(readlink -f $(command -v javac))))
              export JAVA_HOME="$JAVA_HOME_GUESS"
              echo "JAVA_HOME=$JAVA_HOME"
              PYI_PIN=$(python -c "import sys
v = sys.version_info[:2]
if v < (3, 7): print(\"pyinstaller<5.6\")
elif v < (3, 8): print(\"pyinstaller<6\")
else: print(\"pyinstaller\")")
              CLICK_PIN=$(python -c "import sys; print(\"click<8\" if sys.version_info < (3, 7) else \"click\")")
              pip install --no-cache-dir "$PYI_PIN" "$CLICK_PIN"
              bash scripts/fetch_plantuml_jar.sh
              bash scripts/build_jre.sh
              bash scripts/stage_linux_runtime.sh
              bash scripts/pyinstaller/build.sh
            '

      - name: List artifacts
        shell: bash
        run: ls -lh pyinstaller-dist/

      - uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.label }}
          path: |
            pyinstaller-dist/plantuml-onefile-*
            pyinstaller-dist/plantuml-onedir-*.zip
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Stage 2: clean-env tests. Each Linux test pulls a base image with
  # neither Python nor Java installed; macOS/Windows tests run on the
  # bare runner with the artifact freshly downloaded.
  # ------------------------------------------------------------------
  test_clean_linux:
    name: test (clean) / ${{ matrix.label }} on ${{ matrix.image }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'debian:12-slim'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:22.04'
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:24.04'
          # 2017-2020-era bare-OS coverage for portable exe.
          # We build the binary on python:3.6-slim-stretch (Debian 9,
          # glibc 2.24, 2017) so it should run on anything glibc 2.24+.
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'debian:10-slim'        # Debian 10 buster (2019, glibc 2.28)
          - label: linux-x86_64-glibc
            os: ubuntu-22.04
            image: 'ubuntu:18.04'          # Ubuntu 18.04 LTS (2018, glibc 2.27)
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'debian:12-slim'
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'ubuntu:22.04'
          - label: linux-aarch64-glibc
            os: ubuntu-22.04-arm
            image: 'ubuntu:18.04'
          # alpine:3.19 EOL'd in Nov 2024 (musl 1.2.4 lacks pwritev2 that
          # Python 3.10 from alpine:3.20+ relies on). Test from 3.20 up only.
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.20'
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.21'
          - label: linux-x86_64-musl
            os: ubuntu-22.04
            image: 'alpine:3.10'           # Alpine 3.10 (2019, musl 1.1.22)
          - label: linux-aarch64-musl
            os: ubuntu-22.04-arm
            image: 'alpine:3.20'

    env:
      DOCKER_IMAGE: ${{ matrix.image }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-${{ matrix.label }}
          path: dist

      - name: List downloaded artifact
        shell: bash
        run: ls -lh dist/

      - name: Selfcheck onefile in ${{ matrix.image }}
        shell: bash
        run: |
          set -e
          ONEFILE=$(ls dist/plantuml-onefile-* | head -1)
          test -n "$ONEFILE" || { echo 'no onefile artifact'; exit 1; }
          chmod +x "$ONEFILE"
          BASENAME=$(basename "$ONEFILE")
          docker run --rm -v "$PWD/dist:/dist:ro" -e BASENAME="$BASENAME" \
            "$DOCKER_IMAGE" sh -ec '
              command -v python3 >/dev/null 2>&1 && echo "warn: python3 present" || echo "ok: no python3"
              command -v java >/dev/null 2>&1 && echo "warn: java present" || echo "ok: no java"
              cp "/dist/$BASENAME" /tmp/plantuml
              chmod +x /tmp/plantuml
              /tmp/plantuml --help >/dev/null
              /tmp/plantuml info
              /tmp/plantuml selfcheck --no-color --no-env
            '

      - name: Selfcheck onedir.zip in ${{ matrix.image }}
        shell: bash
        run: |
          set -e
          ONEDIR_ZIP=$(ls dist/plantuml-onedir-*.zip | head -1)
          test -n "$ONEDIR_ZIP" || { echo 'no onedir zip artifact'; exit 1; }
          # Extract on the host runner (ubuntu has unzip preinstalled) and
          # mount the unpacked dir into the bare test container.  Avoids a
          # dependency on apt/apk having a working unzip mirror inside
          # whatever bare image we are testing against.
          rm -rf extracted; mkdir extracted
          unzip -q "$ONEDIR_ZIP" -d extracted
          INNER=$(ls -d extracted/plantuml-onedir-* | head -1)
          test -d "$INNER" || { echo "extraction produced no dir"; exit 1; }
          docker run --rm -v "$PWD/$INNER:/opt/plantuml-onedir:ro" \
            "$DOCKER_IMAGE" sh -ec '
              # Copy in (read-only mount + chmod cannot coexist on some FS)
              cp -r /opt/plantuml-onedir /tmp/plantuml-onedir
              chmod +x /tmp/plantuml-onedir/plantuml
              /tmp/plantuml-onedir/plantuml --help >/dev/null
              /tmp/plantuml-onedir/plantuml selfcheck --no-color --no-env
            '

  test_clean_macos_x86:
    name: test (clean) / macos-x86_64
    needs: build
    runs-on: macos-15-intel
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-macos-x86_64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          chmod +x dist/plantuml-onefile-macos-x86_64
          ./dist/plantuml-onefile-macos-x86_64 --help >/dev/null
          ./dist/plantuml-onefile-macos-x86_64 info
          ./dist/plantuml-onefile-macos-x86_64 selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-macos-x86_64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          chmod +x "$DIR/plantuml"
          "$DIR/plantuml" selfcheck --no-color --no-env

  # macos-arm64 portable test is omitted — see the build matrix comment for why.

  test_clean_windows_x86:
    name: test (clean) / windows-x86_64
    needs: build
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows-x86_64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          ls dist/
          ./dist/plantuml-onefile-windows-x86_64.exe --help
          ./dist/plantuml-onefile-windows-x86_64.exe info
          ./dist/plantuml-onefile-windows-x86_64.exe selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-windows-x86_64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          "$DIR/plantuml.exe" selfcheck --no-color --no-env

  test_clean_windows_arm64:
    name: test (clean) / windows-arm64
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-windows-arm64
          path: dist
      - name: Selfcheck onefile
        shell: bash
        run: |
          ./dist/plantuml-onefile-windows-arm64.exe --help
          ./dist/plantuml-onefile-windows-arm64.exe info
          ./dist/plantuml-onefile-windows-arm64.exe selfcheck --no-color --no-env
      - name: Selfcheck onedir.zip
        shell: bash
        run: |
          unzip -q dist/plantuml-onedir-windows-arm64.zip -d extracted
          DIR=$(ls -d extracted/plantuml-onedir-* | head -1)
          "$DIR/plantuml.exe" selfcheck --no-color --no-env
