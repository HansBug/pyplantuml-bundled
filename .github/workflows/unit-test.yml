name: Unit tests

# Source-tree pytest matrix across {ubuntu, windows, macOS} × four
# Python versions.  This is the "developer fast path" feedback loop —
# it does NOT replace `build.yml` (cross-platform wheel build + 22-distro
# stage-2 matrix) or `portable.yml` (PyInstaller binaries).
#
# Why no `stage_linux_runtime.sh` here?  That script's job is to copy
# the libfontconfig/freetype/CJK chain *out of* a manylinux/musllinux
# container *into* the wheel; running it on an ubuntu-22.04 host runner
# would pull the wrong SONAMEs.  Instead Linux apt-installs the
# equivalent packages and `pyplantuml/__init__.py` falls back to system
# fontconfig (the `if runtime_dir.exists()` branch).  macOS and Windows
# rely on CoreText / GDI's built-in CJK families (PingFang / Yu Gothic /
# Microsoft YaHei) — the bundled JRE's FontManager finds them via the
# OS font discovery path.
#
# Coverage gate: 100% line coverage on the Phase-1 modules
# (_inmem / session / _diagnose) — see issue #1.  Defensive paths that
# are racy to trigger live (mid-render JVM death, stdin BrokenPipeError
# after pre-checks) carry `# pragma: no cover` annotations.
#
# Security: this workflow does not consume user-provided strings
# (issue/PR titles, commit messages, head_ref, etc.) in `run:` blocks,
# so there is no command-injection surface.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: unit-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      # CJK fonts so test_cjk.py's byte-size assertions pass.
      # WenQuanYi MicroHei is the same family the wheel bundles under
      # vendored/fonts/, so behaviour here matches the shipped artefact.
      - name: Install host fonts + freetype (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fontconfig fonts-wqy-microhei fonts-dejavu-core libfreetype6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Stage assets (jar + jre)
        shell: bash
        run: |
          bash scripts/fetch_plantuml_jar.sh
          bash scripts/build_jre.sh

      - name: Install package + pytest + coverage
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov

      - name: Run pytest with 100% coverage gate on Phase-1 modules
        shell: bash
        run: |
          python -m pytest tests/ -v --tb=short --color=no \
            --cov=pyplantuml._inmem \
            --cov=pyplantuml.session \
            --cov=pyplantuml._diagnose \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100

      - name: Upload coverage to Codecov
        # Don't fail the build on a Codecov-side glitch — the
        # --cov-fail-under gate above is the authoritative coverage
        # check; Codecov is the trend graph, not the door.
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests-${{ matrix.os }}-py${{ matrix.python-version }}
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

  # ------------------------------------------------------------------
  # plantuml-compat: same pytest battery, but the bundled jar is
  # swapped out for an arbitrary upstream PlantUML version.  Catches
  # cross-version regressions in the wrapper code (`-pipe -pipedelimitor`
  # framing, `-checkonly` stderr parsing, SVG CJK encoding shifts,
  # PNG byte-size drift) before they reach a release.
  #
  # Versions are mid-year representatives spanning 2020-2026 plus a
  # "latest" entry resolved at job start from
  # `repos/plantuml/plantuml/releases/latest`.  `latest` floats and
  # the pinned versions stay fixed for regression-detect.
  #
  # Linux + Python 3.10 only — the cross-OS / cross-Python axes are
  # already exercised by the `pytest` job above; this matrix is
  # specifically about the upstream-jar axis.
  # ------------------------------------------------------------------
  pytest-plantuml-compat:
    name: pytest / plantuml ${{ matrix.plantuml-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plantuml-version:
          - '1.2020.7'
          - '1.2021.7'
          - '1.2022.7'
          - '1.2023.7'
          - '1.2024.0'
          - '1.2024.7'
          - '1.2025.5'
          - '1.2026.2'
          - 'latest'

    steps:
      - uses: actions/checkout@v4

      - name: Install host fonts + freetype
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fontconfig fonts-wqy-microhei fonts-dejavu-core libfreetype6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Resolve plantuml version
        id: resolve
        env:
          REQUESTED: ${{ matrix.plantuml-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$REQUESTED" = "latest" ]; then
            v=$(gh api repos/plantuml/plantuml/releases/latest --jq '.tag_name' | sed 's/^v//')
          else
            v="$REQUESTED"
          fi
          echo "Resolved version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download plantuml jar (no SHA pin — compat fixture)
        env:
          PLANTUML_V: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          # 1.2020 / 1.2021 only have SourceForge jars (no GH release
          # asset attached even though the tag exists).  1.2022+ ship
          # a downloadable plantuml-<v>.jar on GH Releases.
          year=$(echo "$PLANTUML_V" | awk -F. '{print $2}')
          if [ "$year" -lt 2022 ]; then
            url="https://sourceforge.net/projects/plantuml/files/${PLANTUML_V}/plantuml.${PLANTUML_V}.jar/download"
          else
            url="https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_V}/plantuml-${PLANTUML_V}.jar"
          fi
          echo "Fetching $url"
          curl -fsSL --retry 3 -o src/pyplantuml/plantuml.jar "$url"
          ls -lh src/pyplantuml/plantuml.jar
          # Sanity: must be a real jar, not a 1KB error page.
          test "$(stat -c %s src/pyplantuml/plantuml.jar)" -gt 1000000

      - name: Build JRE (jlink)
        run: bash scripts/build_jre.sh

      - name: Install package + pytest + coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov

      - name: Run pytest with 100% coverage gate on Phase-1 modules
        run: |
          python -m pytest tests/ -v --tb=short --color=no \
            --cov=pyplantuml._inmem \
            --cov=pyplantuml.session \
            --cov=pyplantuml._diagnose \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        env:
          PLANTUML_V: ${{ steps.resolve.outputs.version }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: plantuml-${{ steps.resolve.outputs.version }}
          name: plantuml-${{ steps.resolve.outputs.version }}
          fail_ci_if_error: false
