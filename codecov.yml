coverage:
  status:
    project:
      default:
        # Use the previous build's coverage as the bar; allow a small
        # downward delta so flaky network-bound tests on a single
        # platform don't fail the whole PR's status check.  The
        # workflow's --cov-fail-under=100 gate on the new Phase-1
        # modules is the strict floor; codecov is the trend graph.
        target: auto
        threshold: 3%
        if_ci_failed: success
